spring:
  application:
    name: client-fidelity
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console

client-fidelity:
  persistence:
    type: h2
    csv:
      path: ./data/users.csv
      campaign-path: ./data/campaigns.csv
  authentication:
    code-expiration: PT5M
    jwt-expiration: PT1H
    max-failed-attempts: 5
    email-provider: console
    phone-provider: not-configured
    jwt-secret: local-development-secret-change-before-production
    smtp:
      sender: no-reply@client-fidelity.local
      timeout: 5s
    ses:
      region: us-east-1
      sender: no-reply@client-fidelity.local
      timeout: 5s
